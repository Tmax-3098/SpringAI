spring:
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: phi3:latest
    openai:
      api-key: ${OPEN_AI_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.9
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: true
  datasource:
    url: jdbc:postgresql://localhost:5434/my-test-vectordb
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
logging:
  level:
    org.springframework.ai:
      chat.client: DEBUG